llm:
  provider: ollama
  default_model: llama3
  router:
    small_task: llama3
    reasoning: mistral
    code: codellama
    fallback: llama3

ollama:
  host: http://localhost:11434

rag:
  vector_db: qdrant
  qdrant_host: http://localhost:6333
  collection: hal_memory

memory:
  immediate_store: redis
  permanent_store: iris
  redis:
    host: http://localhost:6379
    ttl_seconds: 3600
  iris:
    db_path: /opt/hal/runtime/memory/iris_memory.db

mcp:
  enabled: true
  port: 9100

vscode_bridge:
  enabled: true
  port: 9200

system:
  dev_root: /opt/hal
  runtime_root: /srv/hal
